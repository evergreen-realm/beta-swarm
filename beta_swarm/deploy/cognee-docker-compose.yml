version: '3.8'

services:
  cognee:
    image: cognee/cognee:latest
    ports:
      - "8002:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-betaswarm123}
    networks:
      - beta-swarm # Managed by cognee-docker-compose.yml
    depends_on:
      - neo4j

networks:
  beta-swarm:
    name: beta-swarm
    external: true
