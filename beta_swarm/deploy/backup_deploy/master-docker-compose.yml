services:
  beta-swarm-core:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ../workspace:/app/workspace
      - ../checkpoints:/app/checkpoints
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - swarm_network

  gitnexus-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "beta_swarm.tools.gitnexus.mcp_server"]
    env_file:
      - ../.env
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - swarm_network

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - ../.env
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-betaswarm123}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - swarm_network

networks:
  swarm_network:
    driver: bridge
