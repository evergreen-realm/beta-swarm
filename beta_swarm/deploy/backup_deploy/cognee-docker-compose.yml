version: '3.8'

services:
  cognee:
    image: cognee/cognee:latest # Assuming official cognee image
    ports:
      - "8002:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    networks:
      - cognee_network

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    networks:
      - cognee_network

volumes:
  neo4j-data:

networks:
  cognee_network:
    driver: bridge
